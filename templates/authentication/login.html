{% extends "base_auth.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}
<div class="auth-logo">
  <i class="bi bi-lightning-charge-fill"></i>
  <h1>DFC Manager</h1>
  <p>Direction Financière et Comptable</p>
</div>

{% if messages %}
  {% for msg in messages %}
    <div class="alert alert-danger alert-sm py-2">{{ msg }}</div>
  {% endfor %}
{% endif %}

<form method="post" autocomplete="off">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label fw-500 small">Identifiant</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input type="text" name="username" class="form-control"
             value="{{ username|default:'' }}" required autofocus placeholder="Votre identifiant">
    </div>
  </div>
  <div class="mb-4">
    <label class="form-label fw-500 small">Mot de passe</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" name="password" class="form-control" required placeholder="••••••••">
    </div>
  </div>
  <button type="submit" class="btn btn-cie w-100 py-2 fw-600">
    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
  </button>
</form>

<p class="text-center text-muted small mt-4 mb-0">
  DFC Manager v1.0 — DFC/CIE &copy; 2026
</p>
{% endblock %}
